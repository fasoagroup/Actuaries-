<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actuaries - Professional Template</title>
    <meta http-equiv="refresh" content="0; url=https://github.com/fasoagroup/Actuaries-/wiki" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 20px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a.button {
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .button-secondary:hover {
            background: #e8e8e8;
            border-color: #bbb;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦅</div>
        <h1>Actuaries</h1>
        <p class="subtitle">Professional Template Repository</p>
        
        <p class="description">
            A comprehensive template for actuarial projects. Redirecting you to the project repository...
        </p>
        
        <div style="margin-bottom: 30px;">
            <div class="loader"></div>
            <p style="color: #999; font-size: 13px;">Redirecting...</p>
        </div>
        
        <div class="button-group">
            <a href="https://github.com/fasoagroup/Actuaries-" class="button button-primary">
                → View Repository
            </a>
            <a href="https://github.com/fasoagroup/Actuaries-/wiki" class="button button-secondary">
                📖 View Wiki
            </a>
        </div>
        
        <p style="margin-top: 30px; color: #999; font-size: 12px;">
            If you are not redirected, <a href="https://github.com/fasoagroup/Actuaries-" style="color: #667eea;">click here</a>
        </p>
    </div>
</body>
</html>
